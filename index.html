<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食力大挑戰 - 第二關：良好飲食選擇</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Noto Sans TC', sans-serif; background-color: #222; display: flex; justify-content: center; align-items: center; }
  
  /* 遊戲主容器 */
  #game-container { width: 100vw; max-width: 1280px; aspect-ratio: 16 / 9; background: linear-gradient(135deg, #FFF8E7 0%, #FFE8D6 50%, #E8F5E9 100%); position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
  .screen { display: none; width: 100%; height: 100%; padding: 20px; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
  .screen.active { display: flex; }

  /* 字體與按鈕 */
  .game-title { font-size: 40px; font-weight: 900; color: #E65100; text-shadow: 2px 2px 0 #FFB347; margin-bottom: 8px; text-align: center;}
  .game-subtitle { font-size: 18px; color: #FF7043; margin-bottom: 24px; font-weight: 700; text-align: center; line-height: 1.5;}
  .primary-btn { background: linear-gradient(135deg, #FF7043, #E64A19); color: white; border: none; padding: 14px 40px; font-size: 20px; font-weight: 700; border-radius: 16px; cursor: pointer; transition: all 0.2s; font-family: inherit; box-shadow: 0 4px 12px rgba(230,74,25,0.3); }
  .primary-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(230,74,25,0.5); }
  .primary-btn:disabled { background: #B0BEC5; cursor: not-allowed; box-shadow: none; color: #ECEFF1; }

  /* 大廳 */
  .lobby-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 30px 40px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
  .name-input { width: 100%; padding: 14px; font-size: 18px; border: 3px solid #FFB347; border-radius: 16px; outline: none; text-align: center; margin-bottom: 20px; font-family: inherit; }
  .char-options { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
  .char-btn { background: #FFF3E0; border: 3px solid transparent; border-radius: 16px; padding: 12px 20px; font-size: 40px; cursor: pointer; transition: all 0.2s; }
  .char-btn.selected { border-color: #FF7043; background: #FFE0B2; transform: scale(1.1); box-shadow: 0 4px 12px rgba(255,112,67,0.3); }

  /* 教材輪播 (已對應 JPG 檔名) */
  .carousel-wrap { background: white; border-radius: 20px; padding: 24px; max-width: 800px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-bottom: 10px; }
  .carousel-content { display: none; text-align: center; }
  .carousel-content.active { display: block; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .carousel-nav { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
  .nav-btn { background: #64B5F6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover:not(:disabled) { background: #1E88E5; }
  .nav-btn:disabled { background: #CFD8DC; cursor: not-allowed; color: #90A4AE; }
  </style>
 </head>
 <body>
  <div id="game-container">
   <!-- 封面螢幕 -->
   <div id="lobby-screen" class="screen active">
    <div class="lobby-card">
     <div class="game-title">🏪 營養闖關島</div>
     <div class="game-subtitle">第二關：良好飲食選擇</div>
     <input type="text" id="player-name" class="name-input" placeholder="輸入你的名字" maxlength="10"> 
     <div class="char-options">
       <button class="char-btn selected" onclick="selectChar('🍌', this)">🍌</button>
       <button class="char-btn" onclick="selectChar('🍎', this)">🍎</button>
       <button class="char-btn" onclick="selectChar('🍊', this)">🍊</button>
     </div>
     <button class="primary-btn" onclick="startTutorial()">進入教材區</button>
    </div>
   </div>
   
   <!-- 教材區螢幕 -->
   <div id="tutorial-screen" class="screen">
    <div class="game-title">📚 購物前導訓練</div>
    <div class="carousel-wrap">
      <div class="carousel-content active"><img src="良好飲食選擇_1.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_2.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_3.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_4.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_5.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_6.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_7.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-content"><img src="良好飲食選擇_8.JPG" style="width: 100%; border-radius: 12px;"></div>
      <div class="carousel-nav">
        <button class="nav-btn" onclick="changePage(-1)">上一張</button>
        <button class="nav-btn" onclick="changePage(1)">下一張</button>
      </div>
      <div style="text-align: center; margin-top: 10px;"><span id="carousel-page">1</span> / 8</div>
    </div>
    <button class="primary-btn" onclick="startGame()">開始闖關</button>
   </div>

   <!-- 遊戲螢幕範例 (可依需求增加內容) -->
   <div id="rpg-screen" class="screen">
    <div class="game-title">🎮 遊戲進行中...</div>
    <p>這是您的遊戲區域，教材已閱讀完畢！</p>
    <button class="primary-btn" onclick="location.reload()">回到首頁</button>
   </div>
  </div>

  <script>
  const gameState = {
    name: '', character: '🍌', tutPage: 0
  };

  function selectChar(emoji, btn) {
    gameState.character = emoji;
    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function startTutorial() {
    gameState.name = document.getElementById('player-name').value || '小勇者';
    document.getElementById('lobby-screen').classList.remove('active');
    document.getElementById('tutorial-screen').classList.add('active');
  }

  function changePage(step) {
    const pages = document.querySelectorAll('.carousel-content');
    pages[gameState.tutPage].classList.remove('active');
    gameState.tutPage = (gameState.tutPage + step + pages.length) % pages.length;
    pages[gameState.tutPage].classList.add('active');
    document.getElementById('carousel-page').innerText = gameState.tutPage + 1;
  }

  function startGame() {
    document.getElementById('tutorial-screen').classList.remove('active');
    document.getElementById('rpg-screen').classList.add('active');
  }
  </script>
 </body>
</html>
